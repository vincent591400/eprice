<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ePrice 查詢工具</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --border: #2d3a4d;
      --text: #e6edf3;
      --muted: #8b9eb0;
      --accent: #58a6ff;
      --success: #3fb950;
      --error: #f85149;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Noto Sans TC", sans-serif;
      background: var(--bg);
      color: var(--text);
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }

    .container {
      width: 100%;
      max-width: 700px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 2rem;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
    }

    h1 {
      margin: 0 0 1.5rem;
      font-size: 1.35rem;
      font-weight: 700;
      text-align: center;
      color: var(--text);
    }

    .field {
      margin-bottom: 1.25rem;
    }

    .field label {
      display: block;
      margin-bottom: 0.35rem;
      font-size: 0.9rem;
      color: var(--muted);
    }

    .field input, .field textarea {
      width: 100%;
      padding: 0.65rem 0.85rem;
      font-size: 1rem;
      font-family: inherit;
      color: var(--text);
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      outline: none;
      transition: border-color 0.2s;
    }

    .field input:focus, .field textarea:focus {
      border-color: var(--accent);
    }

    .field input::placeholder, .field textarea::placeholder {
      color: var(--muted);
    }

    .btn {
      width: 100%;
      margin-top: 0.5rem;
      padding: 0.75rem 1rem;
      font-size: 1rem;
      font-weight: 600;
      font-family: inherit;
      color: #fff;
      background: var(--accent);
      border: none;
      border-radius: 8px;
      cursor: pointer;
      transition: opacity 0.2s, transform 0.05s;
    }

    .btn:hover {
      opacity: 0.9;
    }

    .btn:active {
      transform: scale(0.98);
    }

    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    .result {
      margin-top: 1.5rem;
      padding: 1rem 1.25rem;
      border-radius: 8px;
      font-size: 0.95rem;
      display: none;
    }

    .result.visible {
      display: block;
    }

    .result.success {
      background: rgba(63, 185, 80, 0.15);
      border: 1px solid rgba(63, 185, 80, 0.4);
      color: var(--success);
    }

    .result.error {
      background: rgba(248, 81, 73, 0.12);
      border: 1px solid rgba(248, 81, 73, 0.35);
      color: var(--error);
    }

    .result .label {
      color: var(--muted);
      margin-right: 0.5rem;
    }

    .result .value {
      font-weight: 600;
      font-size: 1.1rem;
    }

    .result-list {
      margin-top: 0.75rem;
      max-height: 320px;
      overflow: auto;
      border: 1px solid var(--border);
      border-radius: 6px;
      background: var(--bg);
    }

    .result-list table {
      width: 100%;
      border-collapse: collapse;
      font-size: 0.85rem;
    }

    .result-list th, .result-list td {
      padding: 0.5rem 0.75rem;
      text-align: left;
      border-bottom: 1px solid var(--border);
    }

    .result-list th {
      color: var(--muted);
      font-weight: 600;
    }

    .result-list tr:last-child td {
      border-bottom: none;
    }

    /* ── BOM 查詢相關 ── */
    .bom-link {
      color: var(--accent);
      text-decoration: underline;
      cursor: pointer;
    }
    .bom-link:hover {
      opacity: 0.8;
    }
    .bom-section-title {
      margin-top: 1.5rem;
      margin-bottom: 0.5rem;
      font-size: 1rem;
      font-weight: 600;
      color: var(--accent);
    }

    .result-count {
      color: var(--muted);
      font-size: 0.9rem;
      margin-top: 0.5rem;
    }

    .loading {
      text-align: center;
      color: var(--muted);
      margin-top: 1rem;
      display: none;
    }

    .loading.visible {
      display: block;
    }

    /* ── 步驟進度條 ── */
    .progress-stepper {
      display: none;
      margin-top: 1.25rem;
      padding: 1rem 1.25rem;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
    }
    .progress-stepper.visible {
      display: block;
    }
    .progress-stepper .stepper-title {
      font-size: 0.85rem;
      color: var(--muted);
      margin-bottom: 0.75rem;
    }
    .step-item {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      padding: 0.4rem 0;
      font-size: 0.9rem;
      color: var(--border);
      transition: color 0.3s, opacity 0.3s;
    }
    .step-item.done {
      color: var(--success);
    }
    .step-item.active {
      color: var(--accent);
    }
    .step-item.pending {
      color: var(--border);
    }
    .step-icon {
      width: 22px;
      height: 22px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 0.8rem;
      border-radius: 50%;
      border: 2px solid currentColor;
      transition: all 0.3s;
    }
    .step-item.done .step-icon {
      background: var(--success);
      border-color: var(--success);
      color: #fff;
    }
    .step-item.active .step-icon {
      border-color: var(--accent);
      animation: pulse 1.2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.4; }
    }
    .step-label {
      flex: 1;
    }
    .step-item.active .step-label {
      font-weight: 600;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>ePrice 查詢工具</h1>

    <form id="form">
      <div class="field">
        <label for="username">User Name</label>
        <input type="text" id="username" name="username" placeholder="請輸入帳號" required />
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" placeholder="請輸入密碼" required />
      </div>
      <div class="field">
        <label for="product_name">Product Name <span style="color:var(--muted);font-size:0.82rem;">（每行一個，可一次查詢多個產品）</span></label>
        <textarea id="product_name" name="product_name" placeholder="每行一個產品名稱，例如：&#10;cExpress-SL&#10;ND-6150" required rows="3" style="resize:vertical;"></textarea>
      </div>
      <div class="field">
        <label for="period_start">Cost(Highest) 起始時間 <span style="color:var(--muted);font-size:0.82rem;">（格式 YYYYMM，例如 202501）</span></label>
        <input type="text" id="period_start" name="period_start" value="202501" placeholder="202501" maxlength="6" style="width:120px;" />
      </div>
      <div class="field">
        <label for="bom_plant">BOM 查詢工廠 <span style="color:var(--muted);font-size:0.82rem;">（點擊結果料號時使用）</span></label>
        <select id="bom_plant" style="width:180px;padding:0.65rem 0.5rem;font-size:1rem;font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;outline:none;">
          <option value="1100">1100-TPMC</option>
          <option value="2100">2100-SHMC</option>
        </select>
      </div>
      <div class="field">
        <label for="selling_price">Selling Price <span style="color:var(--muted);font-size:0.82rem;">（選填；每行一個對應產品順序，修改後立即重算 E2E%）</span></label>
        <div style="display:flex;gap:0.5rem;align-items:flex-start;">
          <textarea id="selling_price" name="selling_price" placeholder="每行一個，對應產品順序&#10;例如：100.50&#10;85.00" rows="3" style="flex:1;resize:vertical;"></textarea>
          <select id="sell_currency" style="width:80px;padding:0.65rem 0.5rem;font-size:1rem;font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;outline:none;">
            <option value="USD">USD</option>
            <option value="NTD">NTD</option>
            <option value="RMB">RMB</option>
          </select>
        </div>
      </div>
      <div class="field">
        <label>匯率設定 <span style="color:var(--muted);font-size:0.82rem;">（E2E% 統一換算為台幣後計算）</span></label>
        <div style="display:flex;gap:0.75rem;align-items:center;flex-wrap:wrap;">
          <span style="color:var(--muted);font-size:0.9rem;">1 USD =</span>
          <input type="number" id="usd_rate" value="32" step="any" min="0" style="width:80px;padding:0.5rem 0.6rem;font-size:0.95rem;font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;outline:none;" />
          <span style="color:var(--muted);font-size:0.9rem;">NTD</span>
          <span style="color:var(--muted);font-size:0.9rem;margin-left:0.5rem;">1 RMB =</span>
          <input type="number" id="rmb_rate" value="4.4" step="any" min="0" style="width:80px;padding:0.5rem 0.6rem;font-size:0.95rem;font-family:inherit;color:var(--text);background:var(--bg);border:1px solid var(--border);border-radius:8px;outline:none;" />
          <span style="color:var(--muted);font-size:0.9rem;">NTD</span>
        </div>
      </div>
      <button type="submit" class="btn" id="btnSubmit">查詢 Base Price</button>
    </form>

    <div class="progress-stepper" id="progressStepper">
      <div class="stepper-title">查詢進度</div>
      <div class="step-item pending" data-step="0">
        <div class="step-icon">1</div>
        <div class="step-label">啟動瀏覽器</div>
      </div>
      <div class="step-item pending" data-step="1">
        <div class="step-icon">2</div>
        <div class="step-label">登入 ePrice</div>
      </div>
      <div class="step-item pending" data-step="2">
        <div class="step-icon">3</div>
        <div class="step-label">搜尋產品 Base Price</div>
      </div>
      <div class="step-item pending" data-step="3">
        <div class="step-icon">4</div>
        <div class="step-label">登入 EIP / Anydoor</div>
      </div>
      <div class="step-item pending" data-step="4">
        <div class="step-icon">5</div>
        <div class="step-label">查詢 Cost(Highest)</div>
      </div>
      <div class="step-item pending" data-step="5">
        <div class="step-icon">6</div>
        <div class="step-label">整理結果</div>
      </div>
    </div>

    <div class="result" id="result"></div>
    <div class="result-list" id="resultList" style="display: none;"></div>

    <!-- BOM 查詢進度 -->
    <div class="progress-stepper" id="bomStepper" style="display:none;">
      <div class="stepper-title">BOM 查詢進度 — <span id="bomStepperPN"></span></div>
      <div class="step-item pending" data-step="0">
        <div class="step-icon">1</div>
        <div class="step-label">啟動瀏覽器</div>
      </div>
      <div class="step-item pending" data-step="1">
        <div class="step-icon">2</div>
        <div class="step-label">登入 EIP / Anydoor</div>
      </div>
      <div class="step-item pending" data-step="2">
        <div class="step-icon">3</div>
        <div class="step-label">開啟 BOM with cost</div>
      </div>
      <div class="step-item pending" data-step="3">
        <div class="step-icon">4</div>
        <div class="step-label">查詢 BOM 資料</div>
      </div>
      <div class="step-item pending" data-step="4">
        <div class="step-icon">5</div>
        <div class="step-label">篩選 71-/72- 物料</div>
      </div>
    </div>

    <!-- BOM 結果 -->
    <div class="result" id="bomResult"></div>
    <div class="result-list" id="bomResultList" style="display:none;"></div>

  </div>

  <script>
    const form = document.getElementById("form");
    const btnSubmit = document.getElementById("btnSubmit");
    const resultEl = document.getElementById("result");
    const stepper = document.getElementById("progressStepper");
    const stepItems = stepper.querySelectorAll(".step-item");
    let currentProducts = [];
    var _testConfigFile = null;  // 測試模式時記錄設定檔名
    var _queryStartTime = null;  // 記錄查詢開始時間

    function showStepper(show) {
      stepper.classList.toggle("visible", show);
      btnSubmit.disabled = show;
      if (show) {
        stepItems.forEach(function(el) {
          el.className = "step-item pending";
        });
      }
    }

    function updateStep(stepIdx, label) {
      stepItems.forEach(function(el) {
        var idx = parseInt(el.getAttribute("data-step"));
        if (idx < stepIdx) {
          el.className = "step-item done";
          el.querySelector(".step-icon").textContent = "\u2713";
        } else if (idx === stepIdx) {
          el.className = "step-item active";
          if (label) el.querySelector(".step-label").textContent = label;
        } else {
          el.className = "step-item pending";
        }
      });
    }

    function markAllDone() {
      stepItems.forEach(function(el) {
        el.className = "step-item done";
        el.querySelector(".step-icon").textContent = "\u2713";
      });
    }

    function parseNumeric(s) {
      if (!s && s !== 0) return null;
      const m = (s + "").replace(/,/g, "").match(/[\d]+\.?\d*/);
      return m ? parseFloat(m[0]) : null;
    }

    function extractCurrency(s) {
      if (!s) return "";
      const m = (s + "").match(/\b([A-Z]{2,4})\b/);
      return m ? m[1] : "";
    }

    function toNTD(value, currency, usdRate, rmbRate) {
      const cur = (currency || "").toUpperCase();
      if (cur === "USD") return value * usdRate;
      if (cur === "RMB" || cur === "CNY") return value * rmbRate;
      return value;
    }

    function escapeHtml(s) {
      const div = document.createElement("div");
      div.textContent = s;
      return div.innerHTML;
    }

    function renderResults() {
      const listEl = document.getElementById("resultList");
      if (!currentProducts.length) return;

      // 解析 Selling Price（每行一個或分號分隔，逐行對應產品查詢順序）
      const spText = document.getElementById("selling_price").value.trim();
      const spLines = spText ? spText.split(/[;\n]+/).map(function(s){return s.trim();}).filter(function(s){return s;}) : [];
      const selCurrency = document.getElementById("sell_currency").value;
      const usdRate = parseNumeric(document.getElementById("usd_rate").value) || 1;
      const rmbRate = parseNumeric(document.getElementById("rmb_rate").value) || 1;

      resultEl.className = "result visible success";
      resultEl.innerHTML = "<span class=\"label\">共 </span><span class=\"value\">" + currentProducts.length + "</span><span class=\"label\"> 筆</span>";
      listEl.style.display = "block";

      var prevQueryName = null;
      var rowsHtml = currentProducts.map(function(p) {
        var html = "";
        // 不同產品查詢之間加分隔列
        if (p.query_name && p.query_name !== prevQueryName) {
          html += '<tr style="background:rgba(88,166,255,0.1);"><td colspan="7" style="font-weight:600;color:var(--accent);font-size:0.9rem;">\u25b8 ' + escapeHtml(p.query_name) + '</td></tr>';
          prevQueryName = p.query_name;
        }

        const cur = p.currency || "-";
        const cost = p.cost_lowest || "-";
        const bpCur = p.currency ? " (" + p.currency + ")" : "";

        // 依目前匯率將每筆 (cost, currency) 換算 NTD 取最大
        var pnFirst = (p.product_number_name_spec || "").split("\n")[0].trim();
        var is92 = pnFirst.startsWith("92");
        var defaultCostH = is92 ? "外購品直接參考Cost (Lowest)" : "此版本尚未生產過";
        var bestCostVal = null, bestCostCur = "", costHLabel = defaultCostH;
        var entries = p.cost_highest_entries || [];
        if (entries.length) {
          var bestNTD = null;
          for (var ei = 0; ei < entries.length; ei++) {
            var ev = entries[ei].cost;
            var ec = entries[ei].currency || "";
            var ntdV = toNTD(ev, ec, usdRate, rmbRate);
            if (bestNTD === null || ntdV > bestNTD) {
              bestNTD = ntdV;
              bestCostVal = ev;
              bestCostCur = ec;
            }
          }
          if (bestCostVal !== null) {
            costHLabel = bestCostVal.toFixed(2) + (bestCostCur ? " (" + bestCostCur + ")" : "");
          }
        }

        // 外購品 (92開頭) 且無 Cost(Highest) 時，E2E 改用 Cost(Lowest) 計算
        var e2eCostVal = bestCostVal;
        var e2eCostCur = bestCostCur;
        if (is92 && bestCostVal === null) {
          var clNum = parseFloat((p.cost_lowest || "").replace(/,/g, ""));
          if (!isNaN(clNum)) {
            e2eCostVal = clNum;
            e2eCostCur = "NTD";
          }
        }

        // 根據 query_index 匹配對應的 Selling Price（只填一個則套用全部）
        var sellingPrice = null;
        if (spLines.length === 1) {
          sellingPrice = parseNumeric(spLines[0]);
        } else if (p.query_index !== undefined && p.query_index < spLines.length) {
          sellingPrice = parseNumeric(spLines[p.query_index]);
        }

        var spDisplay = "-";
        var e2eDisplay = "-";
        if (sellingPrice !== null && sellingPrice > 0) {
          spDisplay = sellingPrice.toFixed(2) + " " + selCurrency;
          if (e2eCostVal !== null) {
            var spNTD = toNTD(sellingPrice, selCurrency, usdRate, rmbRate);
            var costNTD = toNTD(e2eCostVal, e2eCostCur, usdRate, rmbRate);
            if (spNTD > 0) {
              var e2e = (spNTD - costNTD) / spNTD * 100;
              e2eDisplay = e2e.toFixed(1) + "%";
            }
          }
        }
        // 將料號做成可點擊連結（觸發 BOM 查詢）
        var pnLines = (p.product_number_name_spec || "").split("\n");
        var pnFirstLine = pnLines[0].trim();
        var pnLinkHtml = '<a href="#" class="bom-link" data-pn="' + escapeHtml(pnFirstLine) + '">' + escapeHtml(pnFirstLine) + '</a>';
        var pnRestHtml = pnLines.slice(1).map(function(l){ return escapeHtml(l); }).join("<br>");
        var pnCellHtml = pnLinkHtml + (pnRestHtml ? "<br>" + pnRestHtml : "");

        html += "<tr><td>" + pnCellHtml +
               "</td><td>" + escapeHtml(cur) +
               "</td><td>" + escapeHtml(p.base_price) + escapeHtml(bpCur) +
               "</td><td>" + escapeHtml(cost) +
               "</td><td>" + escapeHtml(costHLabel) +
               "</td><td>" + escapeHtml(spDisplay) +
               "</td><td>" + escapeHtml(e2eDisplay) + "</td></tr>";
        return html;
      }).join("");

      listEl.innerHTML = "<table><thead><tr>" +
        "<th>Product Number / Name / Spec</th><th>Currency</th><th>Base Price</th><th>Cost (Lowest)</th>" +
        "<th>Cost (Highest)</th><th>Selling Price</th><th>E2E% (NTD基準)</th></tr></thead><tbody>" +
        rowsHtml + "</tbody></table>";
    }

    // 即時重算：任何計算相關欄位改變都立即更新
    ["selling_price", "sell_currency", "usd_rate", "rmb_rate"].forEach(function(id) {
      const el = document.getElementById(id);
      if (el.tagName === "SELECT") el.addEventListener("change", renderResults);
      else el.addEventListener("input", renderResults);
    });

    // ── 測試模式：URL 帶 ?test=xxx.json 時自動帶入產品與價格 ──
    (function() {
      var params = new URLSearchParams(window.location.search);
      var testFile = params.get("test");
      if (!testFile) return;

      fetch("/api/test_config?file=" + encodeURIComponent(testFile))
        .then(function(r) { return r.json(); })
        .then(function(cfg) {
          if (cfg.error) { alert("載入測試設定失敗: " + cfg.error); return; }

          _testConfigFile = testFile;
          var products = cfg.products || [];
          var names = products.map(function(p) { return p.name; });
          document.getElementById("product_name").value = names.join("\n");

          // Selling Price：每行對應一個產品
          var prices = products.map(function(p) {
            return p.selling_price != null ? p.selling_price : "";
          });
          document.getElementById("selling_price").value = prices.join("\n");

          // 幣別（取第一個產品的設定）
          if (products.length && products[0].sell_currency) {
            var sel = document.getElementById("sell_currency");
            for (var i = 0; i < sel.options.length; i++) {
              if (sel.options[i].value === products[0].sell_currency) {
                sel.selectedIndex = i; break;
              }
            }
          }

          // 匯率
          if (cfg.usd_rate) document.getElementById("usd_rate").value = cfg.usd_rate;
          if (cfg.rmb_rate) document.getElementById("rmb_rate").value = cfg.rmb_rate;
          if (cfg.period_start) document.getElementById("period_start").value = cfg.period_start;

          // 提示使用者輸入帳密後自動送出
          document.title = "[測試模式] ePrice 查詢工具";
          var hint = document.createElement("div");
          hint.style.cssText = "margin-bottom:1rem;padding:0.6rem 1rem;background:rgba(88,166,255,0.15);border:1px solid rgba(88,166,255,0.4);border-radius:8px;color:var(--accent);font-size:0.85rem;text-align:center;";
          hint.textContent = "測試模式：已載入 " + products.length + " 個產品（" + testFile + "），請輸入帳密後按 Enter 自動開始查詢";
          form.insertBefore(hint, form.firstChild);

          // 密碼欄 Enter 自動送出
          document.getElementById("password").addEventListener("keydown", function(ev) {
            if (ev.key === "Enter") {
              ev.preventDefault();
              form.dispatchEvent(new Event("submit", {cancelable: true}));
            }
          });
        })
        .catch(function(err) { alert("載入測試設定失敗: " + err.message); });
    })();

    // ── 測試模式：查詢完成後自動產出報告 ──
    function generateTestReport(configFile, products, username, elapsed, warning) {
      fetch("/api/test_report", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          config_file: configFile,
          products: products,
          username: username,
          elapsed: elapsed,
          warning: warning,
        }),
      })
      .then(function(r) { return r.json(); })
      .then(function(rpt) {
        if (rpt.error) { console.error("報告產生失敗:", rpt.error); return; }
        var reportEl = document.createElement("div");
        reportEl.style.cssText = "margin-top:0.75rem;padding:0.7rem 1rem;background:rgba(63,185,80,0.12);border:1px solid rgba(63,185,80,0.35);border-radius:8px;color:var(--success);font-size:0.9rem;";
        reportEl.innerHTML =
          "<b>測試報告已產出</b> &mdash; " +
          "Pass: " + rpt.passed + " / Fail: " + rpt.failed + " / 總計: " + rpt.total +
          "<br><span style='color:var(--muted);font-size:0.82rem;'>" +
          "HTML: " + escapeHtml(rpt.html_report) + "<br>" +
          "CSV: " + escapeHtml(rpt.csv_report) + "</span>";
        document.getElementById("resultList").after(reportEl);
      })
      .catch(function(err) { console.error("報告產生失敗:", err); });
    }

    // ── BOM 查詢：點擊料號觸發 ──
    var _bomQuerying = false;
    var bomStepper = document.getElementById("bomStepper");
    var bomStepItems = bomStepper.querySelectorAll(".step-item");
    var bomResultEl = document.getElementById("bomResult");
    var bomListEl = document.getElementById("bomResultList");

    function showBomStepper(show) {
      bomStepper.style.display = show ? "block" : "none";
      bomStepper.classList.toggle("visible", show);
      if (show) {
        bomStepItems.forEach(function(el) {
          el.className = "step-item pending";
          var idx = parseInt(el.getAttribute("data-step"));
          el.querySelector(".step-icon").textContent = (idx + 1) + "";
        });
      }
    }

    function updateBomStep(stepIdx, label) {
      bomStepItems.forEach(function(el) {
        var idx = parseInt(el.getAttribute("data-step"));
        if (idx < stepIdx) {
          el.className = "step-item done";
          el.querySelector(".step-icon").textContent = "\u2713";
        } else if (idx === stepIdx) {
          el.className = "step-item active";
          if (label) el.querySelector(".step-label").textContent = label;
        } else {
          el.className = "step-item pending";
        }
      });
    }

    function markAllBomDone() {
      bomStepItems.forEach(function(el) {
        el.className = "step-item done";
        el.querySelector(".step-icon").textContent = "\u2713";
      });
    }

    function renderBomResults(data) {
      var items = data.bom_items || [];
      bomResultEl.className = "result visible success";
      bomResultEl.innerHTML = '<span class="label">BOM 物料（71/72 開頭）— </span>' +
        '<span class="value">' + escapeHtml(data.pn) + '</span>' +
        '<span class="label"> / ' + escapeHtml(data.plant) + '  共 </span>' +
        '<span class="value">' + items.length + '</span><span class="label"> 筆</span>';
      bomListEl.style.display = "block";

      var html = "<table><thead><tr>" +
        "<th>PART NO</th><th>Part Spec</th><th>Lead Time</th>" +
        "<th>Accumu Qty</th><th>Last Purchasing Price</th><th>Local Currency</th>" +
        "</tr></thead><tbody>";
      items.forEach(function(item) {
        html += "<tr><td>" + escapeHtml(item.part_no || "") +
                "</td><td>" + escapeHtml(item.part_spec || "") +
                "</td><td>" + escapeHtml(item.lead_time || "") +
                "</td><td>" + escapeHtml(item.accumu_qty || "") +
                "</td><td>" + escapeHtml(item.last_purchasing_price || "") +
                "</td><td>" + escapeHtml(item.local_currency || "") + "</td></tr>";
      });
      html += "</tbody></table>";
      bomListEl.innerHTML = html;
    }

    async function startBomQuery(pn) {
      if (_bomQuerying) {
        alert("BOM 查詢進行中，請等待完成");
        return;
      }
      var username = document.getElementById("username").value.trim();
      var password = document.getElementById("password").value.trim();
      var plant = document.getElementById("bom_plant").value;

      if (!username || !password) {
        alert("請先填寫帳號與密碼");
        return;
      }

      _bomQuerying = true;
      showBomStepper(true);
      document.getElementById("bomStepperPN").textContent = pn + " (" + plant + ")";
      bomResultEl.classList.remove("visible");
      bomListEl.style.display = "none";

      try {
        var res = await fetch("/api/bom_query_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username: username, password: password, pn: pn, plant: plant }),
        });

        var reader = res.body.getReader();
        var decoder = new TextDecoder();
        var buffer = "";

        while (true) {
          var chunk = await reader.read();
          if (chunk.done) break;
          buffer += decoder.decode(chunk.value, { stream: true });

          var lines = buffer.split("\n");
          buffer = lines.pop();

          for (var li = 0; li < lines.length; li++) {
            var line = lines[li];
            if (!line.startsWith("data: ")) continue;
            var payload = JSON.parse(line.slice(6));

            if (payload.type === "progress") {
              updateBomStep(payload.step, payload.label);
            } else if (payload.type === "result") {
              markAllBomDone();
              setTimeout(function() { showBomStepper(false); }, 600);
              if (payload.success) {
                renderBomResults(payload);
                if (payload.warning) {
                  var warnEl = document.createElement("div");
                  warnEl.style.cssText = "margin-top:0.5rem;padding:0.5rem 0.75rem;background:rgba(210,153,34,0.15);border:1px solid rgba(210,153,34,0.4);border-radius:6px;color:#d2992a;font-size:0.85rem;white-space:pre-wrap;";
                  warnEl.textContent = payload.warning;
                  bomListEl.prepend(warnEl);
                }
              } else {
                bomResultEl.className = "result visible error";
                bomResultEl.textContent = payload.error || "BOM 查詢失敗";
                bomListEl.style.display = "none";
              }
            } else if (payload.type === "error") {
              showBomStepper(false);
              bomResultEl.className = "result visible error";
              bomResultEl.textContent = payload.error || "BOM 查詢失敗";
            }
          }
        }
      } catch (err) {
        bomResultEl.className = "result visible error";
        bomResultEl.textContent = "BOM 連線錯誤：" + (err.message || "請確認後端已啟動");
        showBomStepper(false);
      } finally {
        _bomQuerying = false;
      }
    }

    // 委派事件：點擊結果表格中的料號連結
    document.getElementById("resultList").addEventListener("click", function(e) {
      var link = e.target.closest(".bom-link");
      if (!link) return;
      e.preventDefault();
      var pn = link.getAttribute("data-pn");
      if (pn) startBomQuery(pn);
    });

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const username = document.getElementById("username").value.trim();
      const password = document.getElementById("password").value.trim();
      const product_name = document.getElementById("product_name").value.trim();
      const period_start = document.getElementById("period_start").value.trim() || "202501";

      if (!username || !password || !product_name) {
        resultEl.className = "result visible error";
        resultEl.textContent = "請填寫 User Name、Password 與 Product Name。";
        return;
      }

      showStepper(true);
      _queryStartTime = Date.now();
      resultEl.classList.remove("visible");
      document.getElementById("resultList").style.display = "none";
      currentProducts = [];

      try {
        const res = await fetch("/api/query_stream", {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ username, password, product_name, period_start }),
        });

        const reader = res.body.getReader();
        const decoder = new TextDecoder();
        let buffer = "";

        while (true) {
          const { done, value } = await reader.read();
          if (done) break;
          buffer += decoder.decode(value, { stream: true });

          let lines = buffer.split("\n");
          buffer = lines.pop();

          for (const line of lines) {
            if (!line.startsWith("data: ")) continue;
            const payload = JSON.parse(line.slice(6));

            if (payload.type === "progress") {
              updateStep(payload.step, payload.label);
            } else if (payload.type === "result") {
              markAllDone();
              setTimeout(function() { showStepper(false); }, 600);
              if (payload.success) {
                currentProducts = payload.products || [];
                renderResults();
                if (payload.warning) {
                  var warnEl = document.createElement("div");
                  warnEl.style.cssText = "margin-top:0.5rem;padding:0.5rem 0.75rem;background:rgba(210,153,34,0.15);border:1px solid rgba(210,153,34,0.4);border-radius:6px;color:#d2992a;font-size:0.85rem;white-space:pre-wrap;";
                  warnEl.textContent = payload.warning;
                  document.getElementById("resultList").prepend(warnEl);
                }
                // 測試模式：自動產出測試報告
                if (_testConfigFile) {
                  var elapsed = (Date.now() - _queryStartTime) / 1000;
                  generateTestReport(_testConfigFile, currentProducts, username, elapsed, payload.warning || "");
                }
              } else {
                resultEl.className = "result visible error";
                resultEl.textContent = payload.error || "查詢失敗";
                document.getElementById("resultList").style.display = "none";
              }
            } else if (payload.type === "error") {
              showStepper(false);
              resultEl.className = "result visible error";
              resultEl.textContent = payload.error || "查詢失敗";
            }
          }
        }
      } catch (err) {
        resultEl.className = "result visible error";
        resultEl.textContent = "連線錯誤：" + (err.message || "請確認後端已啟動");
        showStepper(false);
      }
    });
  </script>
</body>
